---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-doctor

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-doctor
  namespace: k8s-doctor

---
# ClusterRole for read access to pods, nodes, events, deployments
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-doctor-reader
rules:
# Read pods
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

# Read pod logs
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]

# Read nodes
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]

# Read events
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]

# Read services
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]

# Read deployments
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]

# Read statefulsets
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list", "watch"]

# Read daemonsets
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["get", "list", "watch"]

# Read replicasets
- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get", "list", "watch"]

# Read namespaces
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]

---
# ClusterRole for write access (remediation)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-doctor-remediator
rules:
# Delete pods (to restart them)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["delete"]

# Patch deployments (for rollouts and scaling)
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["patch", "update"]

# Patch statefulsets
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["patch", "update"]

# Patch nodes (for cordon/uncordon)
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["patch"]

---
# ClusterRoleBinding for reader
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-doctor-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-doctor-reader
subjects:
- kind: ServiceAccount
  name: k8s-doctor
  namespace: k8s-doctor

---
# ClusterRoleBinding for remediator
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-doctor-remediator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-doctor-remediator
subjects:
- kind: ServiceAccount
  name: k8s-doctor
  namespace: k8s-doctor
