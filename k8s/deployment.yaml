---
# ConfigMap for K8s Doctor configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-doctor-config
  namespace: k8s-doctor
data:
  TARGET_NAMESPACES: "default,kube-system,monitoring"
  CHECK_INTERVAL: "30"
  MONITOR_PODS: "true"
  MONITOR_NODES: "true"
  MONITOR_DEPLOYMENTS: "true"
  MONITOR_STATEFULSETS: "true"
  MONITOR_DAEMONSETS: "true"
  LOG_LINES: "100"
  EVENTS_CHECK_HOURS: "1"
  AUTO_FIX: "true"
  AUTO_RESTART_PODS: "true"
  MAX_RESTARTS_PER_HOUR: "5"
  MAX_DIAGNOSES_PER_HOUR: "30"
  SEND_LOW_SEVERITY_ALERTS: "false"
  HEALTH_CHECK_PORT: "8080"
  HEALTH_CHECK_HOST: "0.0.0.0"

---
# Secret for API keys
apiVersion: v1
kind: Secret
metadata:
  name: k8s-doctor-secrets
  namespace: k8s-doctor
type: Opaque
stringData:
  anthropic-api-key: "sk-ant-YOUR-API-KEY-HERE"
  slack-webhook-url: ""  # Optional

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-doctor
  namespace: k8s-doctor
  labels:
    app: k8s-doctor
    version: v1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: k8s-doctor
  template:
    metadata:
      labels:
        app: k8s-doctor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: k8s-doctor
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: k8s-doctor
        image: python:3.12-slim
        imagePullPolicy: IfNotPresent
        
        # Build and run the application
        command:
          - sh
          - -c
          - |
            apt-get update && apt-get install -y git && rm -rf /var/lib/apt/lists/*
            pip install kubernetes anthropic python-dotenv flask pyyaml pydantic requests
            cd /app && python k8s_doctor.py

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: k8s-doctor-secrets
              key: anthropic-api-key

        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: k8s-doctor-secrets
              key: slack-webhook-url
              optional: true

        # Load config from ConfigMap
        envFrom:
        - configMapRef:
            name: k8s-doctor-config

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        volumeMounts:
        - name: app
          mountPath: /app
        - name: cache
          mountPath: /tmp

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

      volumes:
      - name: app
        configMap:
          name: k8s-doctor-app
          defaultMode: 0555
      - name: cache
        emptyDir:
          sizeLimit: 100Mi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - k8s-doctor
              topologyKey: kubernetes.io/hostname

      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

---
# Service for health endpoint
apiVersion: v1
kind: Service
metadata:
  name: k8s-doctor
  namespace: k8s-doctor
  labels:
    app: k8s-doctor
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  selector:
    app: k8s-doctor

---
# ServiceMonitor for Prometheus (optional)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: k8s-doctor
  namespace: k8s-doctor
spec:
  selector:
    matchLabels:
      app: k8s-doctor
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
